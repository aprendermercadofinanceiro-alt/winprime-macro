name: probe-data
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: fetch
        run: |
          {
            echo "=== STOOQ ==="
            curl -s -A "Mozilla/5.0" "https://stooq.com/q/l/?s=^spx+^ndx+^dji+^vix+^bvp+^dax+^ukx+^nkx+^hsi+^kospi+^ibex+^stx+^axjo+xauusd+xagusd+cl.f+cb.f+ewz.us+ms.us+^dxy+usdollar&f=sd2t2ohlcvpn&h&e=csv" || echo FAIL_STOOQ
            echo ""
            echo "=== YAHOO ==="
            curl -s -A "Mozilla/5.0" "https://query1.finance.yahoo.com/v7/finance/quote?symbols=%5EBVSP,ES=F,%5EVIX,GC=F,DX-Y.NYB" || echo FAIL_YQ
          } > probe_out.txt 2>&1
      - name: commit
        run: |
          git config user.name winprime-bot
          git config user.email bot@winprime.local
          git add probe_out.txt
          git commit -m "probe out" || echo nochange
          git push
